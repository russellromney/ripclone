app = 'ripclone-client-test'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile.client'

[env]
  RIPCLONE_URL = 'http://157.230.7.238:8080'

# Keep the machine alive so we can run controlled clones over SSH instead of the
# one-shot multi-mode benchmark script.
[experimental]
  cmd = ['sleep', '86400']

[[vm]]
  size = 'shared-cpu-4x'
  memory = '1gb'


