# Example GitHub Actions workflow for repos that want ripclone to pre-build
# artifacts on every push.
#
# Set these in the *consumer* repo:
#   - Repository variable: RIPCLONE_SERVER (e.g. https://ripclone.example.com)
#   - Repository secret:   RIPCLONE_SERVER_TOKEN (the SHA-256 hash of the token
#                          configured on the ripclone server)
#
# For private repos, the ripclone server itself must be configured with
# RIPCLONE_GITHUB_TOKEN that has read access to the consumer repo.

name: ripclone cache
on:
  push:
    branches:
      - main
      - master

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ripclone sync
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Ripclone ${{ secrets.RIPCLONE_SERVER_TOKEN }}" \
            "${{ vars.RIPCLONE_SERVER }}/v1/repos/${{ github.repository_owner }}/${{ github.event.repository.name }}/sync"
