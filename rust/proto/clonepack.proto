syntax = "proto3";

package ripclone;

// Content-addressed reference to a chunk stored in the CAS.
message ChunkRef {
  // Raw hash bytes. SHA-256 (32 bytes) by default.
  bytes hash = 1;
  // Byte length of the chunk as stored. For archive chunks this is the
  // compressed size; for the metadata chunk it is the protobuf size.
  uint64 len = 2;
}

// Top-level manifest for a commit's clonepack.
//
// This is the only per-commit object the client fetches first. Everything else
// is content-addressed and referenced by hash, so it can be served from a CDN
// or object store via signed URLs.
message ClonepackManifest {
  string commit = 1;
  optional string parent_commit = 2;
  string default_branch = 3;

  // Metadata chunk holds the small .git artifacts (skeleton pack + idx,
  // prebuilt index) and the file/frame tables needed to decode archive chunks.
  ChunkRef metadata_chunk = 4;

  // Archive chunks contain working-tree zstd frames. They are shared across
  // commits and immutable.
  repeated ChunkRef archive_chunks = 5;

  // Head-blobs pack + idx contain every HEAD blob object. They are optional:
  // direct-install needs them so `git checkout-index` can materialize files,
  // but archive-extraction can skip them because the working tree is built
  // from archive chunks.
  //
  // The pack is split into multiple content-addressed chunks so the client can
  // fetch it in parallel. The chunks are concatenated in order to reconstruct
  // the original pack file.
  // The complete object pack for the requested depth: commits, trees, and every
  // blob reachable from HEAD (and from the last `depth` commits). Built with
  // `git pack-objects --window=0` so objects are undeltified. This is the single
  // pack the client installs and materializes the working tree from. Split into
  // content-addressed chunks for parallel fetch; the chunks concatenate in order
  // to reconstruct the pack. (Field names are historical; the pack now carries
  // the full closure, not only HEAD blobs.)
  repeated ChunkRef head_blobs_chunks = 8;
  ChunkRef head_blobs_idx = 7;

  // Deprecated: kept for compatibility with older manifests. New builds write
  // `head_blobs_chunks` instead.
  ChunkRef head_blobs_pack = 6 [deprecated = true];

  // The editable clone payload: many small, self-contained git packs (each
  // ~1-2 MB with its own idx). The client downloads them in parallel and, as
  // each lands, installs it into `.git/objects/pack` and extracts the files it
  // contains — overlapping download and extraction. This list IS the index;
  // no separate per-pack table is needed.
  repeated PackEntry packs = 11;

  // Pre-built multi-pack-index over exactly the packs in `packs`, built
  // server-side using the client's deterministic `pack-<trailer>.{pack,idx}`
  // filenames. The client drops it into `.git/objects/pack/multi-pack-index`
  // so object lookups stay O(log) across many packs without spending CPU on a
  // client-side `git multi-pack-index write`. Optional: if absent (older
  // manifests), the client builds the MIDX itself.
  ChunkRef midx = 12;

  // All pack idx files concatenated into one content-addressed blob. The idx
  // for `packs[i]` lives at `[packs[i].idx_bundle_offset, +packs[i].idx.len)`.
  // The client fetches this ONCE and slices each idx out locally, instead of a
  // separate GET per pack idx — cutting per-pack round-trips from 2 to 1 (a big
  // win on high-latency links). Each slice is still verified against
  // `packs[i].idx.hash`. Optional: if absent (older manifests), the client
  // fetches each idx individually via its `idx` ref.
  ChunkRef idx_bundle = 13;
}

// One self-contained git pack plus its index, addressed by content hash.
message PackEntry {
  ChunkRef pack = 1;
  ChunkRef idx = 2;
  // When true, this pack is history-only: deltified, installed for the object
  // database but NOT hand-parsed for the working tree (the client can't parse
  // deltas, and the worktree comes entirely from the undeltified HEAD-closure
  // packs). Default false = HEAD-closure pack, hand-parsed for the worktree
  // (also back-compatible with older manifests built before this field).
  bool history_only = 3;

  // Byte offset of this pack's idx within the manifest's `idx_bundle`. The idx
  // length is `idx.len`. Only meaningful when `idx_bundle` is set. (0 for the
  // first pack is valid; gate on `idx_bundle` being present, not on offset.)
  uint64 idx_bundle_offset = 4;
}

// Per-commit metadata chunk. This is the only chunk that changes on every
// commit; archive chunks are shared and immutable.
message MetadataChunk {
  // Git objects needed to make HEAD usable (commit, tree, and symlink blobs).
  bytes skeleton_pack = 1;
  bytes skeleton_idx = 2;

  // Prebuilt .git/index with skip-worktree set on every tracked path.
  bytes prebuilt_index = 3;

  // Frame table. The index into this list is the frame index used by fragments.
  repeated FrameInfo frames = 4;

  // File table mapping paths to blobs and fragments.
  repeated FileEntry files = 5;
}

// One zstd frame inside an archive chunk.
message FrameInfo {
  // Index into ClonepackManifest.archive_chunks.
  uint32 chunk_index = 1;
  // Byte offset within that chunk.
  uint64 chunk_offset = 2;
  // Compressed length of the frame.
  uint32 compressed_len = 3;
  // Uncompressed length of the frame.
  uint32 raw_len = 4;
}

// One file in the working tree.
message FileEntry {
  // Repository-relative path, stored as raw bytes to preserve arbitrary git
  // path encodings.
  bytes path = 1;
  // Git mode, e.g. 0o100644 or 0o120000.
  uint32 mode = 2;
  // 20-byte SHA-1 of the git blob.
  bytes blob_sha1 = 3;
  // Fragments making up this file, in order.
  repeated Fragment fragments = 4;
}

// One contiguous slice of a file inside a decompressed frame.
message Fragment {
  // Index into MetadataChunk.frames.
  uint32 frame_index = 1;
  // Byte offset inside the decompressed frame.
  uint32 frame_offset = 2;
  // Uncompressed length of the slice.
  uint32 raw_len = 3;
}
