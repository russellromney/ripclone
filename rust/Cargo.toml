[package]
name = "ripclone"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "ripclone"
path = "src/bin/cli.rs"

[[bin]]
name = "ripclone-server"
path = "src/bin/server.rs"

[[bin]]
name = "ripclone-proxy"
path = "src/bin/ripclone-proxy.rs"

[[bin]]
name = "git-remote-ripclone"
path = "src/bin/git-remote-ripclone.rs"

[[bin]]
name = "rcgit"
path = "src/bin/rcgit.rs"

[dependencies]
anyhow = "1"
axum = "0.8"
base64 = "0.22"
byteorder = "1.5"
crossbeam-channel = "0.5"
clap = { version = "4", features = ["derive", "env"] }
filetime = "0.2"
flate2 = "1"
fuser = "0.15.0"
futures = "0.3"
git2 = "0.20"
hex = "0.4"
libc = "0.2.186"
prost = "0.13"
rayon = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "blocking", "rustls-tls"] }
s3 = { version = "0.1.36", default-features = false, features = ["async", "rustls", "multipart"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha1 = "0.10"
sha2 = "0.10"
tar = "0.4"
tempfile = "3"
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2"
urlencoding = "2"
walkdir = "2"
zstd = { version = "0.13", features = ["zdict_builder"] }
secrecy = "0.10.3"
async-trait = "0.1.89"
jsonwebtoken = "10.4.0"
subtle = "2"

[target.'cfg(target_os = "linux")'.dependencies]
tokio-uring = "0.5"

[build-dependencies]
prost-build = "0.13"
