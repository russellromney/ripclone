# cargo-deny: supply-chain policy. Run locally with `cargo deny check`.
#
# Dependencies are pinned by Cargo.lock (and every CI/Docker cargo invocation
# uses --locked), so they move only when Cargo.lock is deliberately regenerated —
# in practice via a reviewed Dependabot PR. This file is the automated guard:
# known security advisories fail CI (including on a weekly schedule, so a new
# advisory against an unchanged dependency still surfaces), only crates.io is an
# allowed source, and every dependency's license must be on the permissive
# allow-list below.

[advisories]
version = 2
# A yanked crate in the lockfile is a problem worth failing on.
yanked = "deny"
# Triaged-but-unfixable advisories go here, each with a dated reason:
# ignore = [
#   { id = "RUSTSEC-0000-0000", reason = "..." },
# ]

[bans]
# Duplicate versions of a crate are a warning, not a hard failure — they're
# common and transitive, and denying them causes churn for little safety gain.
multiple-versions = "warn"
# We never want a `*` version requirement in our own manifest.
wildcards = "deny"

[licenses]
version = 2
# Permissive licenses only. This is the set actually present in the dependency
# tree (plus the components of a few OR/AND expressions), so a new dependency
# under a strong-copyleft or unlisted license fails CI for a human to evaluate.
# ripclone itself is `MIT OR Apache-2.0`.
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "0BSD",
  "Unicode-3.0",
  "CDLA-Permissive-2.0",
  "BSL-1.0",
  "Unlicense",
  # Weak/file-level copyleft — safe to depend on from a permissive project
  # (does not relicense our code). Currently: uluru (via gix).
  "MPL-2.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
