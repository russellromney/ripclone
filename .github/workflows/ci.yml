name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RIPCLONE_ORIGIN_BASE_DEFAULT: ""

# Caching: setup-rust-toolchain (Swatinem/rust-cache) restores each job's cargo
# registry + target/ dir across runs, keyed by Cargo.lock — so a job recompiles
# only what changed, not the whole dep tree every run. (sccache's GHA backend was
# tried but its server hits GitHub's retired v1 cache API and fails to start,
# killing every cargo invocation; the per-job target cache is the robust choice.)
jobs:
  # Detect whether anything that affects the Docker images changed, so docs- or
  # CI-only PRs skip the (slow) image build.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docker:
              - 'rust/**'
              - 'tests/fly/Dockerfile*'
              - 'scripts/fly_client_test.sh'
              - '.github/workflows/ci.yml'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Reads the pinned channel + components from rust-toolchain.toml; caches the
      # cargo registry + target/ (keyed by Cargo.lock). cache-workspaces -> rust/.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: Lint (fmt + clippy)
        run: bash scripts/ci.sh lint

  # Unit + integration tests (release), run a couple of times as a flake guard.
  # One compile, multiple runs — catches nondeterministic races a single run
  # misses.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: Tests + flake guard (release, repeated)
        run: bash scripts/ci.sh flake

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: End-to-end (local origin, real binaries)
        run: bash scripts/ci.sh e2e

  # Queue + metadata adapters against REAL network databases — Postgres + MySQL
  # (throwaway docker containers brought up by scripts/test-queue-sql.sh) and
  # libsql (a local `sqld`). The default `test` job only compile-checks these
  # engines; this job exercises their dialect-specific SQL. Gated on the same
  # rust-changes filter as docker so docs-only PRs skip it.
  databases:
    needs: changes
    if: ${{ needs.changes.outputs.docker == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      # Put the `sqld` binary on PATH so the libsql e2e runs (it auto-skips
      # without it). Best-effort: if the image layout changes, libsql is skipped
      # but the Postgres + MySQL legs still run.
      - name: Install sqld (libsql server)
        continue-on-error: true
        run: |
          set -x
          docker create --name sqld-bin ghcr.io/tursodatabase/libsql-server:latest
          docker cp sqld-bin:/bin/sqld ./sqld \
            || docker cp sqld-bin:/usr/local/bin/sqld ./sqld
          docker rm sqld-bin
          sudo install -m 0755 ./sqld /usr/local/bin/sqld
          rm -f ./sqld
          sqld --version
      - name: Postgres + MySQL + libsql (queue + metadata) on real servers
        run: bash scripts/ci.sh databases

  # S3-backed remote GC end-to-end suite against a real MinIO container. These
  # tests are #[ignored] in the default cargo suite because they need an S3
  # backend; this job provides one locally and runs them on every PR touching
  # rust/.
  s3gc:
    needs: changes
    if: ${{ needs.changes.outputs.docker == 'true' }}
    runs-on: ubuntu-latest
    services:
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: Wait for MinIO and create bucket
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:9000/minio/health/live >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:9000/minio/health/live >/dev/null
          aws --endpoint-url http://127.0.0.1:9000 --region us-east-1 s3 mb s3://ripclone-test
      - name: S3 GC e2e against MinIO
        run: bash scripts/ci.sh s3gc

  # Validate the images assemble and the binaries run. The real Dockerfiles use
  # buildkit cargo cache mounts that persist on the Fly/Depot deploy builder but
  # NOT on GitHub-hosted runners, so building them here would recompile ~400
  # crates cold every run. Instead, compile the binaries once with the cached
  # toolchain (same as every other job) and assemble runtime-only images
  # (Dockerfile.ci / Dockerfile.client.ci) from them — the runtime stage (apt
  # deps, COPY paths, the binaries running) is what this catches. The real
  # multi-stage Dockerfiles' builder stage is validated on the deploy builder.
  # Gated by the changes filter; runs in parallel with the other jobs.
  docker:
    needs: changes
    if: ${{ needs.changes.outputs.docker == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: Build release binaries (cached toolchain)
        working-directory: rust
        run: cargo build --release --locked --bins
      - name: Stage binaries (rust/target is .dockerignored)
        run: |
          mkdir -p ci-bins
          cp rust/target/release/ripclone \
             rust/target/release/ripclone-server \
             rust/target/release/ripclone-worker \
             rust/target/release/git-remote-ripclone \
             rust/target/release/writer_bench \
             ci-bins/
      - name: Assemble runtime images from the compiled binaries
        run: |
          docker build -f tests/fly/Dockerfile.ci -t ripclone-server:ci .
          docker build -f tests/fly/Dockerfile.client.ci -t ripclone-client:ci .
      - name: Smoke-test the binaries run in the image
        run: |
          docker run --rm ripclone-server:ci ripclone-server --help
          docker run --rm ripclone-server:ci ripclone-worker --help
