name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RIPCLONE_ORIGIN_BASE_DEFAULT: ""

# Caching: setup-rust-toolchain (Swatinem/rust-cache) restores each job's cargo
# registry + target/ dir across runs, keyed by Cargo.lock — so a job recompiles
# only what changed, not the whole dep tree every run. (sccache's GHA backend was
# tried but its server hits GitHub's retired v1 cache API and fails to start,
# killing every cargo invocation; the per-job target cache is the robust choice.)
jobs:
  # Detect whether anything that affects the Docker images changed, so docs- or
  # CI-only PRs skip the (slow) image build.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      bench: ${{ steps.filter.outputs.bench }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docker:
              - 'rust/**'
              - 'tests/fly/Dockerfile*'
              - 'scripts/fly_client_test.sh'
              - '.github/workflows/ci.yml'
            bench:
              - 'rust/**'
              - 'benchmark/**'
              - 'scripts/benchmark_smoke.sh'
              - 'scripts/ci.sh'
              - '.github/workflows/ci.yml'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Reads the pinned channel + components from rust-toolchain.toml; caches the
      # cargo registry + target/ (keyed by Cargo.lock). cache-workspaces -> rust/.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: Lint (fmt + clippy)
        run: bash scripts/ci.sh lint

  # Unit + integration tests (release), run a couple of times as a flake guard.
  # One compile, multiple runs — catches nondeterministic races a single run
  # misses.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: Tests + flake guard (ci profile, repeated)
        run: bash scripts/ci.sh flake

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: End-to-end (local origin, real binaries)
        run: bash scripts/ci.sh e2e

  # Queue + metadata adapters against REAL network databases — Postgres + MySQL
  # (throwaway docker containers brought up by scripts/test-queue-sql.sh) and
  # libsql (a local `sqld`). The default `test` job only compile-checks these
  # engines; this job exercises their dialect-specific SQL. Gated on the same
  # rust-changes filter as docker so docs-only PRs skip it.
  databases:
    needs: changes
    if: ${{ needs.changes.outputs.docker == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      # Put the `sqld` binary on PATH so the libsql e2e runs (it auto-skips
      # without it). Best-effort: if the image layout changes, libsql is skipped
      # but the Postgres + MySQL legs still run.
      - name: Install sqld (libsql server)
        continue-on-error: true
        run: |
          set -x
          docker create --name sqld-bin ghcr.io/tursodatabase/libsql-server:latest
          docker cp sqld-bin:/bin/sqld ./sqld \
            || docker cp sqld-bin:/usr/local/bin/sqld ./sqld
          docker rm sqld-bin
          sudo install -m 0755 ./sqld /usr/local/bin/sqld
          rm -f ./sqld
          sqld --version
      - name: Postgres + MySQL + libsql (queue + metadata) on real servers
        run: bash scripts/ci.sh databases

  # Discover the individual #[ignore = "requires S3 credentials"] test names in
  # e2e_remote_gc_s3.rs so the s3gc job below can shard one-test-per-runner.
  # Reading the list at CI time (instead of hand-listing it in the matrix)
  # means a test added/renamed/removed in that file is picked up automatically
  # — no separate PR to rebalance a hardcoded shard list.
  s3gc-tests:
    needs: changes
    if: ${{ needs.changes.outputs.docker == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.list.outputs.tests }}
    steps:
      - uses: actions/checkout@v7
      - name: List ignored S3 test names
        id: list
        run: |
          set -euo pipefail
          names=$(grep -A2 '#\[ignore = "requires S3 credentials"\]' rust/tests/e2e_remote_gc_s3.rs \
            | grep -oP 'async fn \K[a-zA-Z0-9_]+(?=\()')
          json=$(printf '%s\n' "$names" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "found: $json"
          echo "tests=$json" >> "$GITHUB_OUTPUT"

  # S3-backed remote GC end-to-end suite against a real MinIO container. These
  # tests are #[ignored] in the default cargo suite because they need an S3
  # backend; this job provides one locally and runs them on every PR touching
  # rust/.
  #
  # Sharded one test per matrix job (fail-fast: false) so the many minutes of
  # test bodies (dominated by real S3/build-settling latency, not artificial
  # sleeps) run in parallel instead of serially. Each job gets its own MinIO
  # service + S3 bucket, so shards never share S3 state; within a shard the
  # existing SERVER_LOCK still serializes (there's only ever one test per
  # shard, so it's a no-op) — no change to the single-binary in-process
  # serialization that keeps these tests race-free.
  s3gc:
    needs: [changes, s3gc-tests]
    if: ${{ needs.changes.outputs.docker == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJSON(needs.s3gc-tests.outputs.tests) }}
    services:
      minio:
        image: minio/minio:latest
        # The latest image no longer defaults to `server /data`; without an
        # explicit command it prints help and exits, so the service must run
        # the server subcommand directly.
        command: server /data
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: Wait for MinIO and create bucket
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:9000/minio/health/live >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:9000/minio/health/live >/dev/null
          aws --endpoint-url http://127.0.0.1:9000 --region us-east-1 s3 mb s3://ripclone-test
      - name: S3 GC e2e against MinIO (${{ matrix.test }})
        run: bash scripts/ci.sh s3gc "${{ matrix.test }}"

  # Real multi-provider + server-side-token path against a live Gitea. This is
  # the seam a production dogfood found broken but every file:// e2e missed: a
  # self-hosted `gitea` provider whose upstream token lives ONLY on the server
  # (via RIPCLONE_PROVIDERS), the client passing none — the exact config the
  # provider-token clobber (#114) broke. Gated on the same changes/docker filter
  # as s3gc so docs-only PRs skip it.
  gitea:
    needs: changes
    if: ${{ needs.changes.outputs.docker == 'true' }}
    runs-on: ubuntu-latest
    services:
      gitea:
        image: gitea/gitea:latest
        # Skip the web installer and run headless on sqlite: INSTALL_LOCK plus a
        # sqlite3 DB means the DB migrates on first boot with no interactive
        # setup, so the CLI can create the admin user the moment the API is up.
        env:
          GITEA__security__INSTALL_LOCK: "true"
          GITEA__database__DB_TYPE: sqlite3
          GITEA__server__ROOT_URL: http://127.0.0.1:3000/
          GITEA__server__HTTP_PORT: "3000"
          GITEA__service__DISABLE_REGISTRATION: "true"
        ports:
          - 3000:3000
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: Wait for Gitea, create admin + access token
        run: |
          set -euo pipefail
          # Wait until the migrated API answers (the server runs migrations on
          # first boot, so a 200 here means the DB is ready for the admin CLI).
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:3000/api/v1/version >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:3000/api/v1/version >/dev/null
          # The service container is not addressable by its compose alias for
          # `docker exec`, so resolve the id by image.
          cid="$(docker ps --filter ancestor=gitea/gitea:latest --format '{{.ID}}' | head -n1)"
          test -n "$cid"
          # First admin user (no web installer means it must be created via CLI).
          docker exec -u git "$cid" gitea admin user create \
            --admin --username ci --password ci-password-123 \
            --email ci@example.com --must-change-password=false
          # Mint a scoped access token via the API (Basic-auth with the admin
          # creds). This token authenticates both the Gitea API and git-over-http.
          token="$(curl -sf -X POST \
            -H 'Content-Type: application/json' \
            -u ci:ci-password-123 \
            -d '{"name":"ripclone-ci","scopes":["write:repository","write:user","read:repository","read:user"]}' \
            http://127.0.0.1:3000/api/v1/users/ci/tokens | jq -r .sha1)"
          test -n "$token" && test "$token" != "null"
          # Prove the token works before the test runs (seed check).
          curl -sf -H "Authorization: token $token" \
            http://127.0.0.1:3000/api/v1/user >/dev/null
          echo "RIPCLONE_GITEA_URL=http://127.0.0.1:3000" >> "$GITHUB_ENV"
          echo "RIPCLONE_GITEA_USER=ci" >> "$GITHUB_ENV"
          echo "::add-mask::$token"
          echo "RIPCLONE_GITEA_TOKEN=$token" >> "$GITHUB_ENV"
      - name: Gitea provider + server-side-token e2e
        run: bash scripts/ci.sh gitea

  # Benchmark-harness smoke test. The benchmark scripts drive the server over
  # raw HTTP, so a change to the server's request/response contract does NOT
  # break them at compile time — it silently rots the harness against the next
  # deploy (exactly how the B5 added-repos gate broke it unnoticed: the harness
  # never `add`ed a repo, so a current server would reject every sync with
  # repo_not_added). This job runs benchmark/fly_shaped_benchmark.sh end-to-end
  # against a real local ripclone-server and fails if the harness cannot
  # add/warm/benchmark a fixture repo. Fast tier: debug binaries, file:// origin,
  # unshaped, one run — a couple of minutes. Gated on a bench-specific path
  # filter so harness- or server-only PRs run it and docs-only PRs skip it.
  benchmark:
    needs: changes
    if: ${{ needs.changes.outputs.bench == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: Benchmark-harness smoke test (local origin, real server)
        run: bash scripts/ci.sh benchmark

  # Validate the images assemble and the binaries run. The real Dockerfiles use
  # buildkit cargo cache mounts that persist on the Fly/Depot deploy builder but
  # NOT on GitHub-hosted runners, so building them here would recompile ~400
  # crates cold every run. Instead, compile the binaries once with the cached
  # toolchain (same as every other job) and assemble runtime-only images
  # (Dockerfile.ci / Dockerfile.client.ci) from them — the runtime stage (apt
  # deps, COPY paths, the binaries running) is what this catches. The real
  # multi-stage Dockerfiles' builder stage is validated on the deploy builder.
  # Gated by the changes filter; runs in parallel with the other jobs.
  docker:
    needs: changes
    if: ${{ needs.changes.outputs.docker == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: Build release binaries (cached toolchain)
        working-directory: rust
        run: cargo build --release --locked --bins
      - name: Stage binaries (rust/target is .dockerignored)
        run: |
          mkdir -p ci-bins
          cp rust/target/release/ripclone \
             rust/target/release/ripclone-server \
             rust/target/release/ripclone-worker \
             rust/target/release/git-remote-ripclone \
             rust/target/release/writer_bench \
             ci-bins/
      - name: Assemble runtime images from the compiled binaries
        run: |
          docker build -f tests/fly/Dockerfile.ci -t ripclone-server:ci .
          docker build -f tests/fly/Dockerfile.client.ci -t ripclone-client:ci .
      - name: Smoke-test the binaries run in the image
        run: |
          docker run --rm ripclone-server:ci ripclone-server --help
          docker run --rm ripclone-server:ci ripclone-worker --help

  # The static-musl release target. This is the ONLY job that compiles under
  # `target_env = "musl"`, so it is the only one that exercises the mimalloc
  # `#[global_allocator]` and the hand-written kernel `struct statx` in
  # src/statx_compat.rs. It builds the release binaries + the lib test binary for
  # musl and runs them on a stock Alpine container: a wrong statx offset, a symbol
  # musl lacks, or a stray dynamic link would first appear at release-tag time
  # otherwise. Same changes filter as the docker job.
  musl:
    needs: changes
    if: ${{ needs.changes.outputs.docker == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
          target: x86_64-unknown-linux-musl
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: Install cargo-zigbuild + zig (musl C cross-toolchain)
        # cargo-zigbuild locates zig via the `python-zig` app that the `ziglang`
        # wheel installs. `pipx inject` does NOT put that app on PATH (even with
        # --include-apps), so cargo-zigbuild fails with "cannot find binary
        # path". A plain venv on PATH exposes both cargo-zigbuild and python-zig.
        run: |
          python3 -m venv "$HOME/.zigbuild"
          "$HOME/.zigbuild/bin/pip" install --quiet cargo-zigbuild "ziglang==0.15.2"
          echo "$HOME/.zigbuild/bin" >> "$GITHUB_PATH"
      - name: Build + run the static musl binaries on Alpine
        run: bash scripts/musl-smoke.sh
