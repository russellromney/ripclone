name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Tests mirror from local file:// origins, never GitHub — no network needed.
  RIPCLONE_ORIGIN_BASE_DEFAULT: ""

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Reads the pinned channel + components from rust-toolchain.toml, and
      # caches the cargo registry + target dir (keyed by Cargo.lock).
      # cache-workspaces points it at the project in rust/ so caching works —
      # without it the action can't find Cargo.toml and silently disables the
      # cache, recompiling everything on every run.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: Lint (fmt + clippy)
        run: bash scripts/ci.sh lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: Unit + integration tests (release, parallel)
        run: bash scripts/ci.sh test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: End-to-end (local origin, real binaries)
        run: bash scripts/ci.sh e2e

  # Catch nondeterministic races/ordering bugs that a single test run can miss
  # (e.g. cross-test state leaks). Runs the debug suite a few times.
  flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: Flake guard (repeat suite)
        run: bash scripts/ci.sh flake

  # Build the shipped images so a broken Dockerfile is caught in CI, not at deploy.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build server image
        run: docker build -f Dockerfile -t ripclone-server:ci .
      - name: Build client image
        run: docker build -f Dockerfile.client -t ripclone-client:ci .
