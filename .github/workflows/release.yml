name: release

# Cut a release by pushing a tag: `git tag v0.1.0 && git push origin v0.1.0`.
# The git and TLS stacks are pure Rust (gix + rustls), and the remaining C
# libraries (zstd, zlib-ng, mimalloc) are vendored and statically linked by
# their -sys crates. The Linux binaries target {x86_64,aarch64}-unknown-linux-musl
# and are FULLY static — no libc dependency at all — so one binary per arch runs
# on any Linux, Alpine (musl) and glibc distros alike; the primary target is agents/CI,
# often in Alpine containers (increasingly on arm64). cargo-zigbuild cross-builds
# the aarch64 binary on the x86_64 runner. mimalloc is the global allocator on musl to
# offset musl's slower default allocator (see src/lib.rs). macOS builds natively.
# `protobuf-compiler` and `cmake` are build-time only (prost + zlib-ng);
# cargo-zigbuild supplies the musl C cross-toolchain on the glibc runner.
#
# Required repo secrets:
#   CARGO_REGISTRY_TOKEN  crates.io API token (for the crates-io job)
#   (PyPI uses OIDC Trusted Publishing — configure the project on PyPI, no token)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  # Prebuilt binaries + checksums, one per native platform.
  binaries:
    name: binaries (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, platform: linux-x86_64, target: x86_64-unknown-linux-musl }
          - { os: ubuntu-latest, platform: linux-arm64, target: aarch64-unknown-linux-musl }
          - { os: macos-14, platform: macos-arm64, target: "" }
          - { os: macos-13, platform: macos-x86_64, target: "" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
          target: ${{ matrix.target }}
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: bash scripts/install-build-deps.sh
      - name: Install cargo-zigbuild (Linux musl cross-toolchain)
        if: runner.os == 'Linux'
        # cargo-zigbuild finds zig via the `python-zig` app from the `ziglang`
        # wheel. `pipx inject` does not expose that app on PATH, so cargo-zigbuild
        # fails with "cannot find binary path". Install both into one venv on PATH.
        run: |
          python3 -m venv "$HOME/.zigbuild"
          "$HOME/.zigbuild/bin/pip" install --quiet cargo-zigbuild "ziglang==0.15.2"
          echo "$HOME/.zigbuild/bin" >> "$GITHUB_PATH"
      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf cmake pkg-config libgit2 openssl@3
      # Linux: static musl via cargo-zigbuild (zig cc supplies the musl C
      # cross-toolchain for the vendored -sys crates). macOS: native.
      - name: Build binaries (Linux musl)
        if: runner.os == 'Linux'
        working-directory: rust
        run: cargo zigbuild --release --locked --target ${{ matrix.target }} --bin ripclone --bin ripclone-server --bin ripclone-worker --bin git-remote-ripclone
      - name: Build binaries (macOS)
        if: runner.os == 'macOS'
        working-directory: rust
        run: cargo build --release --locked --bin ripclone --bin ripclone-server --bin ripclone-worker --bin git-remote-ripclone
      - name: Package
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            bindir="rust/target/${{ matrix.target }}/release"
          else
            bindir="rust/target/release"
          fi
          dir="ripclone-${{ matrix.platform }}"
          mkdir -p "$dir"
          cp "$bindir/ripclone" "$bindir/ripclone-server" "$bindir/ripclone-worker" "$bindir/git-remote-ripclone" "$dir/"
          cp LICENSE-MIT LICENSE-APACHE "$dir/"
          tar -czf "$dir.tar.gz" "$dir"
          shasum -a 256 "$dir.tar.gz" > "$dir.tar.gz.sha256"
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            ripclone-${{ matrix.platform }}.tar.gz
            ripclone-${{ matrix.platform }}.tar.gz.sha256
          fail_on_unmatched_files: true

  # Upload the installer alongside the binaries so the curl|sh one-liner and
  # `ripclone update` can fetch `.../releases/latest/download/install.sh`.
  installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: softprops/action-gh-release@v3
        with:
          files: install.sh
          fail_on_unmatched_files: true

  # crates.io: `cargo install ripclone` / `cargo add ripclone`.
  crates-io:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust
      - name: Install build deps
        run: bash scripts/install-build-deps.sh
      - name: cargo publish
        working-directory: rust
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # PyPI: `pip install ripclone`. maturin packages the CLI binary into a wheel.
  # Linux wheels build in a manylinux container, so the C build deps are
  # installed there via before-script-linux.
  pypi:
    name: pypi (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, platform: linux-x86_64, args: "--manylinux 2_28" }
          - { os: macos-14, platform: macos-arm64, args: "" }
          - { os: macos-13, platform: macos-x86_64, args: "" }
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf cmake pkg-config libgit2 openssl@3
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path rust/Cargo.toml ${{ matrix.args }}
          manylinux: ${{ runner.os == 'Linux' && '2_28' || 'auto' }}
          before-script-linux: |
            dnf install -y protobuf-compiler protobuf-devel cmake openssl-devel libgit2-devel fuse-devel || \
            (apt-get update && apt-get install -y protobuf-compiler cmake libssl-dev libgit2-dev libfuse-dev pkg-config)
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.platform }}
          path: dist/*.whl

  pypi-publish:
    needs: pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
