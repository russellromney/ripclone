app = 'ripclone-server-dev'
primary_region = 'iad'

[build]
  # Paths are relative to the repo root: deploy with
  # `fly deploy --config tests/fly/fly.server-dev.toml` run from the repo root
  # (build context = root, so the Dockerfile can COPY rust/ and scripts/).
  dockerfile = 'tests/fly/Dockerfile'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  # Dev: scale to zero when idle to keep cost low. First request after idle eats
  # a cold start (machine boot + server start). Revisit when the webhook-driven
  # sync worker lands — a background build can be stopped mid-flight at min=0.
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-4x'
  memory = '4gb'

[env]
  # Git pack-objects creates temp packs in TMPDIR and renames them into the
  # mirror repo. Keep TMPDIR on the same filesystem as the repo root so the
  # rename succeeds.
  TMPDIR = '/data/repos'

[mounts]
  source = 'ripclone_data'
  destination = '/data'
