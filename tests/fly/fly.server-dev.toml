app = 'ripclone-server-dev'
primary_region = 'iad'

[build]
  # Paths are relative to the repo root: deploy with
  # `fly deploy --config tests/fly/fly.server-dev.toml` run from the repo root
  # (build context = root, so the Dockerfile can COPY rust/ and scripts/).
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8000
  force_https = true
  # Keep the server running for the duration of shaped benchmark sweeps.
  # The benchmark harness also pings healthz, but disabling auto-stop removes
  # the risk of cold-start timeouts between long git-clone runs.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'performance-8x'
  memory = '16gb'

[env]
  # Git pack-objects creates temp packs in TMPDIR and renames them into the
  # mirror repo. Keep TMPDIR on the same filesystem as the repo root so the
  # rename succeeds.
  TMPDIR = '/data/repos'

[mounts]
  source = 'ripclone_data'
  destination = '/data'
