app = 'ripclone-client-dev'
primary_region = 'ewr'

[build]
  # Deploy from the repo root: `fly deploy --config tests/fly/fly.client-dev.toml`.
  dockerfile = 'tests/fly/Dockerfile.client'

[env]
  RIPCLONE_URL = 'https://ripclone-server-dev.fly.dev'

# Keep-alive process: run ripclone-server on :8000 purely so the machine is a
# valid Fly service that can auto-stop when idle (and auto-start on demand). The
# actual client testing is done over SSH with the `ripclone` CLI against
# ripclone-server-dev — this server is just the idle/health target.
[experimental]
  cmd = ['ripclone-server']

[http_service]
  internal_port = 8000
  force_https = true
  # Keep the client machine running during long benchmark sweeps; it only runs
  # when we explicitly SSH in to start a sweep, but the sweep itself can last
  # hours and Fly's HTTP-idle auto-stop would interrupt it.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

# 8 dedicated performance vCPUs to mirror a developer laptop for realistic clone
# timings. Memory is omitted so Fly uses the size's minimum (performance CPUs
# require 2 GB per core).
[[vm]]
  size = 'performance-8x'

# Durable-disk target so we can benchmark the real disk write floor (vs tmpfs).
[mounts]
  source = 'ripclone_data'
  destination = '/data'
