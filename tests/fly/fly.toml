app = 'ripclone'
primary_region = 'iad'

[build]
  # Deploy from the repo root: `fly deploy --config tests/fly/fly.toml`.
  dockerfile = 'tests/fly/Dockerfile'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'performance-8x'
  memory = '16gb'

[env]
  # Git pack-objects creates temp packs in TMPDIR and renames them into the
  # mirror repo. Keep TMPDIR on the same filesystem as the repo root so the
  # rename succeeds.
  TMPDIR = '/data/repos'

[mounts]
  source = 'ripclone_data'
  destination = '/data'
